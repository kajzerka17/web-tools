<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Color Picker</title>
<link rel="stylesheet" href="tools.css" />
<style>
.color-preview {
  width: 100%;
  height: 90px;
  border-radius: 2px;
  border: 1px solid rgba(255,255,255,0.15);
  margin-bottom: 1.2rem;
  transition: background 0.2s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.color-preview::after {
  content: 'click to open picker';
  position: absolute;
  bottom: 8px;
  right: 10px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  mix-blend-mode: difference;
}
input[type="color"] {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
  top: 0; left: 0;
  border: none;
  padding: 0;
  margin: 0;
}

.color-values {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.7rem;
  margin-top: 0.4rem;
}
.color-val-item {
  background: rgba(0,0,0,0.22);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  cursor: pointer;
  transition: border-color 0.2s ease;
}
.color-val-item:hover { border-color: rgba(255,255,255,0.35); }
.color-val-item.copied { border-color: rgba(255,255,255,0.7); }
.val-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.2rem;
}
.val-value {
  font-family: var(--font-mono);
  font-size: 0.88rem;
  color: white;
}

.shades-row {
  display: flex;
  gap: 4px;
  margin-top: 1.2rem;
}
.shade {
  flex: 1;
  height: 28px;
  border-radius: 2px;
  cursor: pointer;
  transition: transform 0.15s ease;
  border: 1px solid rgba(255,255,255,0.08);
}
.shade:hover { transform: scaleY(1.3); }
</style>
</head>
<body>
<div class="overlay">
  <div class="content">
    <a href="index.html" class="back-link">← Tools</a>
    <h1>Color Picker</h1>
    <div class="card">
      <label>Pick a color</label>
      <div class="color-preview" id="preview" style="background:#6e8efb;">
        <input type="color" id="picker" value="#6e8efb" oninput="updateColor(this.value)" />
      </div>

      <div class="color-values">
        <div class="color-val-item" onclick="copyVal(this, 'hex')" id="box-hex">
          <div class="val-label">HEX</div>
          <div class="val-value" id="val-hex">#6e8efb</div>
        </div>
        <div class="color-val-item" onclick="copyVal(this, 'rgb')" id="box-rgb">
          <div class="val-label">RGB</div>
          <div class="val-value" id="val-rgb">rgb(110, 142, 251)</div>
        </div>
        <div class="color-val-item" onclick="copyVal(this, 'hsl')" id="box-hsl">
          <div class="val-label">HSL</div>
          <div class="val-value" id="val-hsl">hsl(228, 94%, 71%)</div>
        </div>
        <div class="color-val-item" onclick="copyVal(this, 'css')" id="box-css">
          <div class="val-label">CSS VAR</div>
          <div class="val-value" id="val-css">--color: #6e8efb</div>
        </div>
      </div>

      <label style="margin-top:1.2rem;">Shades</label>
      <div class="shades-row" id="shades"></div>
    </div>
  </div>
</div>
<script>
  let currentHex = '#6e8efb';

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return {r,g,b};
  }

  function rgbToHsl(r,g,b) {
    r/=255; g/=255; b/=255;
    const max=Math.max(r,g,b), min=Math.min(r,g,b);
    let h,s,l=(max+min)/2;
    if(max===min){ h=s=0; }
    else {
      const d=max-min;
      s=l>0.5?d/(2-max-min):d/(max+min);
      switch(max){
        case r: h=((g-b)/d+(g<b?6:0))/6; break;
        case g: h=((b-r)/d+2)/6; break;
        case b: h=((r-g)/d+4)/6; break;
      }
    }
    return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
  }

  function hslToHex(h,s,l) {
    s/=100; l/=100;
    const a=s*Math.min(l,1-l);
    const f=n=>{ const k=(n+h/30)%12; const c=l-a*Math.max(Math.min(k-3,9-k,1),-1); return Math.round(255*c).toString(16).padStart(2,'0'); };
    return `#${f(0)}${f(8)}${f(4)}`;
  }

  function updateColor(hex) {
    currentHex = hex;
    const {r,g,b} = hexToRgb(hex);
    const {h,s,l} = rgbToHsl(r,g,b);

    document.getElementById('preview').style.background = hex;
    document.getElementById('val-hex').textContent = hex;
    document.getElementById('val-rgb').textContent = `rgb(${r}, ${g}, ${b})`;
    document.getElementById('val-hsl').textContent = `hsl(${h}, ${s}%, ${l}%)`;
    document.getElementById('val-css').textContent = `--color: ${hex}`;

    // Generate shades
    const shadesEl = document.getElementById('shades');
    shadesEl.innerHTML = '';
    for(let i = 10; i <= 90; i+=10) {
      const shade = hslToHex(h,s,i);
      const div = document.createElement('div');
      div.className = 'shade';
      div.style.background = shade;
      div.title = shade;
      div.onclick = () => {
        document.getElementById('picker').value = shade;
        updateColor(shade);
      };
      shadesEl.appendChild(div);
    }
  }

  function copyVal(el, type) {
    const map = { hex:'val-hex', rgb:'val-rgb', hsl:'val-hsl', css:'val-css' };
    const text = document.getElementById(map[type]).textContent;
    navigator.clipboard.writeText(text);
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 1000);
  }

  updateColor('#6e8efb');
</script>
</body>
</html>
