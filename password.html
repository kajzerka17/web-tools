<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Password Generator</title>
<link rel="stylesheet" href="tools.css" />
<style>
.strength-bar {
  height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
  margin-top: 0.5rem;
  margin-bottom: 1.2rem;
  overflow: hidden;
}
.strength-fill {
  height: 100%;
  width: 0%;
  border-radius: 2px;
  transition: width 0.4s ease, background 0.4s ease;
}
.strength-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 1rem;
}
.password-display {
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 2px;
  padding: 1rem 1.1rem;
  font-family: var(--font-mono);
  font-size: 1rem;
  color: white;
  word-break: break-all;
  line-height: 1.5;
  min-height: 56px;
  margin-bottom: 0.7rem;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: border-color 0.2s ease;
}
.password-display:hover { border-color: rgba(255,255,255,0.35); }
.password-display.copied { border-color: rgba(255,255,255,0.7); }

.length-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.1rem;
}
.length-row input[type="range"] {
  flex: 1;
  margin-bottom: 0;
  background: transparent;
  -webkit-appearance: none;
  height: 3px;
  border: none;
  padding: 0;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-runnable-track {
  background: rgba(255,255,255,0.25);
  height: 3px;
  border-radius: 2px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: white;
  border-radius: 50%;
  margin-top: -5.5px;
  transition: transform 0.2s;
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
.length-num {
  font-family: var(--font-mono);
  font-size: 1rem;
  min-width: 28px;
  text-align: right;
  color: white;
}
.checks {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.4rem 1rem;
  margin-bottom: 1.2rem;
}
</style>
</head>
<body>
<div class="overlay">
  <div class="content">
    <a href="index.html" class="back-link">← Tools</a>
    <h1>Password Generator</h1>
    <div class="card">
      <div class="password-display" id="pw-display" onclick="copyPassword()" title="Click to copy">—</div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label">strength</div>

      <label>Length</label>
      <div class="length-row">
        <input type="range" id="pw-length" min="6" max="64" value="20" oninput="updateLength()" />
        <span class="length-num" id="length-display">20</span>
      </div>

      <label>Include</label>
      <div class="checks">
        <div class="checkbox-row">
          <input type="checkbox" id="inc-upper" checked />
          <label for="inc-upper">Uppercase (A–Z)</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="inc-lower" checked />
          <label for="inc-lower">Lowercase (a–z)</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="inc-nums" checked />
          <label for="inc-nums">Numbers (0–9)</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="inc-sym" checked />
          <label for="inc-sym">Symbols (!@#…)</label>
        </div>
      </div>

      <button onclick="generate()">Regenerate</button>
      <hr class="divider" style="margin-top:1.4rem;" />
      <div style="text-align:center;font-family:var(--font-mono);font-size:0.68rem;letter-spacing:0.1em;color:var(--text-muted);margin-top:0.8rem;"><a href="https://github.com/kajzerka17" target="_blank" style="color:rgba(255,255,255,0.35);text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.18);padding-bottom:1px;">https://github.com/kajzerka17</a></div>
    </div>
  </div>
</div>
<script>
  const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const lower = 'abcdefghijklmnopqrstuvwxyz';
  const nums  = '0123456789';
  const syms  = '!@#$%^&*()-_=+[]{}|;:,.<>?';

  function generate() {
    let charset = '';
    if (document.getElementById('inc-upper').checked) charset += upper;
    if (document.getElementById('inc-lower').checked) charset += lower;
    if (document.getElementById('inc-nums').checked)  charset += nums;
    if (document.getElementById('inc-sym').checked)   charset += syms;
    if (!charset) { document.getElementById('pw-display').textContent = 'Select at least one option'; return; }

    const len = parseInt(document.getElementById('pw-length').value);
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    const pw = Array.from(arr).map(v => charset[v % charset.length]).join('');
    document.getElementById('pw-display').textContent = pw;
    updateStrength(pw);
  }

  function updateStrength(pw) {
    let score = 0;
    if (pw.length >= 12) score++;
    if (pw.length >= 20) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const pct = Math.round((score / 6) * 100);
    const fill = document.getElementById('strength-fill');
    const lbl  = document.getElementById('strength-label');
    fill.style.width = pct + '%';

    if (score <= 2)      { fill.style.background = '#e06c6c'; lbl.textContent = 'Weak'; }
    else if (score <= 4) { fill.style.background = '#e0c46c'; lbl.textContent = 'Moderate'; }
    else                 { fill.style.background = '#8ee07a'; lbl.textContent = 'Strong'; }
  }

  function updateLength() {
    const v = document.getElementById('pw-length').value;
    document.getElementById('length-display').textContent = v;
    generate();
  }

  function copyPassword() {
    const el = document.getElementById('pw-display');
    navigator.clipboard.writeText(el.textContent);
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 1000);
  }

  generate();
</script>
</body>
</html>
